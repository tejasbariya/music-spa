<!DOCTYPE html>
<html ng-app="MusicApp">
<head>
    <title>home</title>
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/login.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.js"></script>
    <script src="app.js"></script>
</head>
<body ng-controller="MusicController">

    <form id="login-form">
        <div class="login-text"> Login Form </div>
        <div>
            <div  class="labels">Email</div>
            <input type="text" ng-model="email" placeholder="bentennison69@gmail.com">
        </div>
        <div>
            <div  class="labels">Password</div>
            <input type="password" ng-model="password" >
        </div>
        <div class="msg" ng-bind="msg"></div>
        <input type="submit" ng-click="setData()">
    </form>
</body>
</html>
