<div class="player" ng-controller="playerController">
    <div class="song-img">
        <img ng-src="{{currentSong.img}}" class="img">
    </div>

    <div class="song-name">{{currentSong.name}}</div>

    <div class="song-progress-bar" ng-mousedown="startDrag($event)" ng-click="seek($event)">
        <div class="progress-bg">
            <div class="progress-fill" ng-style="{ width: progress + '%' }">
                <div class="progress-head"></div>
            </div>
        </div>
    </div>

    <audio id="audio" ng-src="{{currentSong.src}}"></audio>

    <div class="song-controlls material-symbols-outlined">
        <div ng-click="prev()">skip_previous</div>
        <div ng-click="rewind()">fast_rewind</div>
        <div ng-click="playPause()">
            <span ng-if="isPlaying">pause_circle</span>
            <span ng-if="!isPlaying">play_circle</span>
        </div>
        <div ng-click="forward()">fast_forward</div>
        <div ng-click="next()">skip_next</div>
    </div>
</div>/
