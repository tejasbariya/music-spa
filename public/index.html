<!DOCTYPE html>
<html lang="en" ng-app="MusicApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music SPA | Glassmorphism</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <!-- AngularJS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>

    <!-- Local Styles -->
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/login.css">
    <link rel="stylesheet" href="styles/player.css">

    <!-- Local Scripts Setup -->
    <script>
        var app = angular.module('MusicApp', ['ngRoute']);
    </script>
    <script src="js/routes.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/player.js"></script>

</head>
<body ng-controller="MainController">
    <!-- Global Navigation -->
    <nav class="navbar glass-panel" ng-if="isLoggedIn()">
        <a href="#!/" class="nav-brand">
            <span class="material-symbols-outlined">library_music</span>
            MusicSPA
        </a>
        <div class="nav-links">
            <a href="#!/" ng-class="{ 'active': isActive('/') }">Home</a>
            <a href="#!/player" ng-class="{ 'active': isActive('/player') }">Player</a>
            <a href="#!/playlist" ng-class="{ 'active': isActive('/playlist') }">Playlists</a>
            <a href="#!/liked" ng-class="{ 'active': isActive('/liked') }">Liked Songs</a>
            <a href="#!/upload" ng-class="{ 'active': isActive('/upload') }">Upload</a>
            <button class="btn btn-secondary" ng-click="logout()">
                <span class="material-symbols-outlined" style="font-size: 1rem; vertical-align: middle;">logout</span> 
                Logout
            </button>
        </div>
    </nav>

    <!-- Inject Views -->
    <main class="main-content">
        <div ng-view></div>
    </main>
</body>
</html>
